<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>职前探 - 求职备考助手</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: white;
      padding: 24px 20px;
      text-align: center;
    }

    header h1 { font-size: 28px; font-weight: 700; letter-spacing: 2px; }
    header p { margin-top: 6px; font-size: 14px; color: #a0aec0; }

    nav {
      display: flex;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      overflow-x: auto;
    }

    nav button {
      flex: 1;
      min-width: 100px;
      padding: 14px 10px;
      border: none;
      background: none;
      font-size: 14px;
      color: #718096;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }

    nav button.active {
      color: #4f46e5;
      border-bottom-color: #4f46e5;
      font-weight: 600;
    }

    .page { display: none; max-width: 720px; margin: 0 auto; padding: 24px 16px; }
    .page.active { display: block; }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #2d3748; }

    input, textarea, select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      color: #2d3748;
      outline: none;
      transition: border 0.2s;
      background: #f7fafc;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #4f46e5;
      background: white;
    }

    textarea { resize: vertical; min-height: 120px; }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      transition: background 0.2s;
    }

    .btn:hover { background: #4338ca; }
    .btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    .result {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      display: none;
    }

    .result.show { display: block; }

    .loading {
      text-align: center;
      color: #718096;
      padding: 20px;
      display: none;
    }

    .loading.show { display: block; }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #e2e8f0;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      color: #c53030;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 12px;
      font-size: 14px;
      display: none;
    }

    .error.show { display: block; }

    .tag {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 6px;
      margin-top: 4px;
    }

    .row { display: flex; gap: 10px; }
    .row input, .row select { flex: 1; }

    footer {
      text-align: center;
      padding: 24px;
      color: #a0aec0;
      font-size: 12px;
    }
  </style>
</head>
<body>

<header>
  <h1>🔍 职前探</h1>
  <p>搜索公司动态 · 解析岗位要求 · 优化简历</p>
</header>

<nav>
  <button class="active" onclick="switchTab('search')">🏠 首页搜索</button>
  <button onclick="switchTab('jd')">📋 JD 解析</button>
  <button onclick="switchTab('questions')">💬 面试题</button>
  <button onclick="switchTab('resume')">📄 简历优化</button>
</nav>

<!-- 首页：搜索公司动态 -->
<div id="search" class="page active">
  <div class="card">
    <h2>搜索公司动态</h2>
    <input type="text" id="searchInput" placeholder="输入公司名称，如：字节跳动" />
    <button class="btn" onclick="doSearch()">搜索</button>
    <div class="loading" id="searchLoading"><span class="spinner"></span>搜索中，请稍候...</div>
    <div class="error" id="searchError"></div>
    <div class="result" id="searchResult"></div>
  </div>
</div>

<!-- JD 解析 -->
<div id="jd" class="page">
  <div class="card">
    <h2>解析岗位 JD</h2>
    <textarea id="jdInput" placeholder="将招聘 JD 粘贴到这里..."></textarea>
    <button class="btn" onclick="doAnalyzeJD()">解析 JD</button>
    <div class="loading" id="jdLoading"><span class="spinner"></span>解析中，请稍候...</div>
    <div class="error" id="jdError"></div>
    <div class="result" id="jdResult"></div>
  </div>
</div>

<!-- 面试题生成 -->
<div id="questions" class="page">
  <div class="card">
    <h2>生成面试题</h2>
    <div class="row">
      <input type="text" id="qCompany" placeholder="目标公司，如：腾讯" />
      <input type="text" id="qJob" placeholder="目标岗位，如：产品经理" value="AI产品经理" />
    </div>
    <button class="btn" onclick="doGenQuestions()">生成面试题</button>
    <div class="loading" id="qLoading"><span class="spinner"></span>生成中，请稍候...</div>
    <div class="error" id="qError"></div>
    <div class="result" id="qResult"></div>
  </div>
</div>

<!-- 简历优化 -->
<div id="resume" class="page">
  <div class="card">
    <h2>简历优化建议</h2>
    <div class="row" style="margin-bottom:10px">
      <input type="text" id="rJob" placeholder="目标岗位" value="AI产品经理" />
      <input type="text" id="rCompany" placeholder="目标公司（可选）" />
    </div>
    <textarea id="resumeInput" placeholder="将简历内容粘贴到这里..." style="min-height:180px"></textarea>
    <button class="btn" onclick="doOptimizeResume()">获取优化建议</button>
    <div class="loading" id="rLoading"><span class="spinner"></span>分析中，请稍候...</div>
    <div class="error" id="rError"></div>
    <div class="result" id="rResult"></div>
  </div>
</div>

<footer>职前探 · 求职备考助手</footer>

<script>
  const BASE_URL = 'https://offer-xia-production.up.railway.app';

  function switchTab(tab) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    event.target.classList.add('active');
  }

  function showLoading(id, show) {
    document.getElementById(id + 'Loading').classList.toggle('show', show);
  }

  function showResult(id, text) {
    const el = document.getElementById(id + 'Result');
    el.textContent = text;
    el.classList.add('show');
  }

  function showError(id, msg) {
    const el = document.getElementById(id + 'Error');
    el.textContent = msg;
    el.classList.add('show');
  }

  function clearState(id) {
    document.getElementById(id + 'Result').classList.remove('show');
    document.getElementById(id + 'Error').classList.remove('show');
  }

  async function post(endpoint, body) {
    const res = await fetch(BASE_URL + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('请求失败，请稍后重试');
    const json = await res.json();
    return json.data;
  }

  async function doSearch() {
    const val = document.getElementById('searchInput').value.trim();
    if (!val) return alert('请输入公司名称');
    clearState('search');
    showLoading('search', true);
    try {
      const data = await post('/search', { company_name: val });
      showResult('search', data);
    } catch(e) {
      showError('search', e.message);
    } finally {
      showLoading('search', false);
    }
  }

  async function doAnalyzeJD() {
    const val = document.getElementById('jdInput').value.trim();
    if (!val) return alert('请输入 JD 内容');
    clearState('jd');
    showLoading('jd', true);
    try {
      const data = await post('/analyze-jd', { jd_text: val });
      showResult('jd', data);
    } catch(e) {
      showError('jd', e.message);
    } finally {
      showLoading('jd', false);
    }
  }

  async function doGenQuestions() {
    const company = document.getElementById('qCompany').value.trim();
    const job = document.getElementById('qJob').value.trim();
    if (!company) return alert('请输入目标公司');
    clearState('q');
    showLoading('q', true);
    try {
      const data = await post('/generate-questions', { company_name: company, job_type: job });
      showResult('q', data);
    } catch(e) {
      showError('q', e.message);
    } finally {
      showLoading('q', false);
    }
  }

  async function doOptimizeResume() {
    const resume = document.getElementById('resumeInput').value.trim();
    const job = document.getElementById('rJob').value.trim();
    const company = document.getElementById('rCompany').value.trim();
    if (!resume) return alert('请输入简历内容');
    clearState('r');
    showLoading('r', true);
    try {
      const data = await post('/optimize-resume', { resume_text: resume, job_type: job, company_name: company });
      showResult('r', data);
    } catch(e) {
      showError('r', e.message);
    } finally {
      showLoading('r', false);
    }
  }

  // 回车触发搜索
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
</script>
</body>
</html>
